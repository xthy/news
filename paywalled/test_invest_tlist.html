<script>
$(document).ready(function(){
	$('#username').focus();

	$('input, button').on('click keydown', function (e) {
		nextNode = $('.error_msg').children('span').get(0).nextSibling;
		if (nextNode && nextNode.nodeType === 3) nextNode.remove();
		$('.error_msg').hide();
	});

	$('#SignIn').click(function() {
		//$('#invest_login').submit();
	});
	$('#invest_login').submit(function(event) {
		if ($.trim($('#username').val()) == "") {
			$('.error_msg').children('span').after("아이디를 입력해 주세요.");
			$('.error_msg').show();
			$('#username').focus();
			event.preventDefault();
		}
		else if ($.trim($('#login_password').val()) == "") {
			$('.error_msg').children('span').after("비밀번호를 입력해 주세요.");
			$('.error_msg').show();
			$('#login_password').focus();
			event.preventDefault();
		}
	});
});
